generations:
  - name: "First Generation (ZN6/ZC6)"
    start_year: 2012
    end_year: 2020
    description: "The first generation of Toyota's compact sports car was developed jointly with Subaru and sold under various names depending on the market: Toyota 86 (Asia, Australia, North America from 2016), Toyota GT86 (Europe), Scion FR-S (United States and Canada, 2012-2016). This lightweight rear-wheel-drive sports coupe featured a naturally aspirated 2.0-liter FA20 boxer engine producing 200 horsepower at 7,000 rpm and 151 lb-ft of torque at 6,400 rpm. The car was praised for its excellent handling balance, low center of gravity, and driver engagement, with a 53/47 front/rear weight distribution. Production began in February 2012 at Subaru's Gunma plant in Japan. The first generation received a facelift in 2016 for the 2017 model year, which included suspension upgrades increasing power to 205 horsepower and torque to 156 lb-ft for manual transmission models, along with a revised final drive ratio. Various special editions were produced throughout its lifecycle, including the TRD GT86, 14R-60, Style Cb, and numerous regional variants. While Subaru BRZ production ended in July 2020, Toyota 86 production continued through at least the third quarter of 2020."

  - name: "Second Generation (ZN8/ZD8)"
    start_year: 2022
    end_year: null
    description: "The second generation, marketed as the GR86 under Toyota's Gazoo Racing performance division, represents a significant evolution of the original platform while maintaining its core philosophy of being a lightweight, affordable rear-wheel-drive sports coupe. Jointly developed with Subaru (which continues to sell the BRZ), the new model addresses the most common criticism of its predecessor by featuring a larger 2.4-liter FA24D naturally aspirated boxer engine producing 228 horsepower at 7,000 rpm and 184 lb-ft of torque at 3,700 rpm—a significant increase in both power and torque delivered at a more accessible rpm. The exterior design features more aggressive styling with functional air intakes, a distinct matrix grille pattern, more pronounced fenders, and a ducktail rear spoiler. Available with either a six-speed manual or six-speed automatic transmission, the GR86 delivers improved acceleration with 0-60 mph times of approximately 5.4 seconds for automatic models and 6.1 seconds for manual models. Despite the larger engine, curb weight increases only marginally thanks to aluminum roof and fender panels, maintaining the car's nimble character. The chassis features increased rigidity with 50 percent more torsional rigidity than its predecessor, adopting elements from the Subaru Global Platform. The interior has been modernized with a 7-inch digital instrument cluster featuring a track-focused display mode, an 8-inch touchscreen infotainment system with standard Apple CarPlay and Android Auto compatibility, and improved materials throughout while maintaining the driver-focused layout. Special editions include the 10th Anniversary Special Edition, Trueno Edition (celebrating 40 years of the AE86), Hakone Edition, and Yuzu Edition."